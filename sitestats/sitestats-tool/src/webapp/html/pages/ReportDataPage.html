<html  
      xmlns="http://www.w3.org/1999/xhtml"  
      xmlns:wicket="http://wicket.sourceforge.net/"  
      xml:lang="en"  
      lang="en">
    <head></head>
    <body>
        <wicket:extend>
        

            <div class="portletBody">
            <!-- Menu -->
            <menu wicket:id="menu" class="navIntraTool">[menu]</menu>
            <div style="width:100% !important" class="content">            
	            <!-- Last Job run -->
	            <span wicket:id="lastJobRun"></span>
	        
	            <!-- Print -->
		        <span wicket:id="printContainer" class="act noprint float-end pt-3 pe-1">
		            <span class="fa fa-print" aria-hidden="true" wicket:message="title:reportres_print"></span>
		            <button type="button" wicket:id="printLink" class="btn btn-link p-0 align-baseline" wicket:message="title:reportres_print">
	                    <wicket:message key="reportres_print">[reportres_print]</wicket:message>
	                </button>
		        </span>
	        
	            <!-- Page title -->
                <div class="page-header">
                    <h1>
	                    <span wicket:id="reportAction"></span>
                    </h1>
                </div>

                <!-- Report data -->
                <sakai-sitestats-report-panel wicket:id="reportPanel"></sakai-sitestats-report-panel>
	            
	            
	            <!-- FORM -->
	            <form wicket:id="form">
		                
		            <!-- BUTTONS -->
		            <p class="act noprint">
		                <input type="submit" wicket:id="back" wicket:message="value:report_back" class="active"/>
		                <input type="submit" wicket:id="export" wicket:message="value:bt_export" class="export"/>
		                
		                <input type="submit" wicket:id="exportXls" wicket:message="value:bt_export_excel" class="sitestats-export-option d-none"/>
		                <input type="submit" wicket:id="exportCsv" wicket:message="value:bt_export_csv" class="sitestats-export-option d-none"/>
		                <input type="submit" wicket:id="exportPdf" wicket:message="value:bt_export_pdf" class="sitestats-export-option d-none"/>
		            </p>
	            </form>            
            </div>
		</div>
  
        </wicket:extend>
    </body>
</html>
