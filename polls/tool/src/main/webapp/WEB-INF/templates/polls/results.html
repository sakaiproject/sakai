<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head}">
</head>
<body>
  <div class="portletBody container-fluid">
    <div th:replace="~{fragments/common :: menu('list')}"></div>

    <h1 class="h4 mb-3" th:text="#{results_title}">Results</h1>
    <p class="fw-semibold" th:utext="${poll.text}">Poll question</p>
    <p th:text="${pollSizeMessage}">Poll size</p>

    <section class="card mb-4" aria-labelledby="poll-results-chart-heading">
      <div class="card-body">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 id="poll-results-chart-heading" class="h5 mb-0" th:text="#{results_chart_title}">Chart</h2>
          <div class="d-flex align-items-center gap-2">
            <label for="chart-type-selection" class="mb-0" th:text="#{results_chart_type}">Chart Type:</label>
            <select id="chart-type-selection" class="form-select form-select-sm" style="width: auto;">
              <option value="bar" th:text="#{results_chart_bar}">Bar</option>
              <option value="pie" th:text="#{results_chart_pie}">Pie</option>
            </select>
          </div>
        </div>
        <p id="poll-results-chart-summary" class="visually-hidden" th:text="#{results_chart_summary}">Chart of poll results by option.</p>
        <div class="position-relative" style="min-height: 20rem;">
          <canvas id="poll-results-chart" aria-describedby="poll-results-chart-summary" height="320"></canvas>
        </div>
      </div>
    </section>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <caption class="visually-hidden" th:text="#{results_summary}">Results summary</caption>
        <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col" th:text="#{results_answers_title}">Answer</th>
          <th scope="col" th:text="#{results_answers_votes}">Votes</th>
          <th scope="col">%</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
          <td th:text="${row.order}">1</td>
          <td>
            <span th:text="${row.text}">Option</span>
            <span th:if="${row.deleted}" th:utext="#{deleted_option_tag_html}"></span>
          </td>
          <td th:text="${row.votes}">0</td>
          <td th:text="${row.percentageLabel}">0%</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
          <td></td>
          <td><strong th:text="#{results_answers_total}">Total</strong></td>
          <td><strong th:text="${totalVotes}">0</strong></td>
          <td><strong th:text="${totalPercentageLabel}">100%</strong></td>
        </tr>
        </tfoot>
      </table>
    </div>

    <div class="act">
      <input type="button" th:onclick="|location.href='@{/votePolls}'|" th:value="#{results_cancel}" value="Back" />
      <a class="btn btn-primary" th:if="${canEdit}" th:href="@{/polls/export/xlsx/{id}(id=${poll.id})}" role="button">
        <span class="bi bi-file-excel" aria-hidden="true"></span>
        <span th:text="#{poll_export_link}">Export to Excel (.xlsx)</span>
      </a>
      <a class="btn btn-primary ms-1" th:if="${canEdit}" th:href="@{/polls/export/csv/{id}(id=${poll.id})}" role="button">
        <span class="bi bi-filetype-csv" aria-hidden="true"></span>
        <span th:text="#{poll_export_link_csv}">Export to CSV (.csv)</span>
      </a>
    </div>
  </div>
  <script th:src="@{/webjars/chart.js/4.5.0/dist/chart.umd.min.js}"></script>
  <script th:inline="javascript">
    window.pollResultsChartData = {
      labels: /*[[${chartLabels}]]*/ [],
      votes: /*[[${chartVotes}]]*/ [],
      percentages: /*[[${chartPercentages}]]*/ [],
      optionLabel: /*[[#{results_answers_title}]]*/ 'Option',
      votesLabel: /*[[#{results_answers_votes}]]*/ 'Votes'
    };
  </script>
  <script th:src="@{/js/polls-results-chart.js}"></script>
</body>
</html>
