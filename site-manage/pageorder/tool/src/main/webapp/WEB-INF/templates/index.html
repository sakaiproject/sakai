<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.toLanguageTag()}">
<head>
  <meta charset="utf-8">
  <title th:text="#{page_title}">Tool Order</title>
  <link href="/library/skin/tool_base.css" rel="stylesheet" media="all">
  <link href="/library/skin/default-skin/tool.css" rel="stylesheet" media="all">
  <script src="/library/js/headscripts.js"></script>
  <link th:href="@{/content/css/tool-order.css}" rel="stylesheet">
  <script th:src="@{/content/js/tool-order.js}" defer></script>
</head>
<body>
  <main id="tool-order-app"
        class="portletBody tool-order"
        th:attr="data-order-url=@{/api/order},
                 data-reset-url=@{/api/reset-order},
                 data-saving-message=#{status_saving},
                 data-saved-message=#{status_saved},
                 data-error-message=#{status_error},
                 data-menu-hide=#{menu_hide_page},
                 data-menu-show=#{menu_show_page},
                 data-menu-lock=#{menu_lock_page},
                 data-menu-unlock=#{menu_enable_page},
                 data-remove-confirm-template=#{remove_tool_confirm('\_\_TITLE\_\_')}">
    <div class="tool-order-heading">
      <div>
        <h1 th:text="#{page_title}">Tool Order</h1>
        <p class="tool-order-site-title" th:text="${siteTitle}">Site title</p>
      </div>
      <form th:action="@{/done}" method="post">
        <button type="submit" class="btn btn-primary" th:text="#{done}">Done</button>
      </form>
    </div>

    <div id="tool-order-alert" class="sak-banner-info" role="status" aria-live="polite">
      <span th:text="#{welcome}">Changes are saved immediately.</span>
    </div>

    <div class="sak-banner-warn">
      <span th:text="#{warning}">Warning message</span>
    </div>
    <div class="sak-banner-warn">
      <span th:text="#{warn_lockResources}">Resources warning</span>
    </div>

    <div class="tool-order-list-header">
      <h2 th:text="#{curr_pages}">Current Tools</h2>
      <button type="button"
              class="btn btn-outline-secondary btn-sm"
              data-action="reset-order"
              th:if="${siteOrdered}"
              th:attr="data-confirm=#{reset_order_confirm}">
        <span class="bi bi-arrow-counterclockwise" aria-hidden="true"></span>
        <span th:text="#{reset}">Reset</span>
      </button>
    </div>

    <ul id="tool-order-list"
        class="list-group tool-order-list"
        th:if="${!#lists.isEmpty(pages)}"
        th:attr="data-reorder-allowed=${reorderAllowed}">
      <li class="list-group-item tool-order-row"
          th:each="page : ${pages}"
          th:id="|tool-order-row-${page.id}|"
          th:attr="data-page-id=${page.id},
                   data-details-url=@{/api/pages/{pageId}/details(pageId=${page.id})},
                   data-visibility-url=@{/api/pages/{pageId}/visibility(pageId=${page.id})},
                   data-access-url=@{/api/pages/{pageId}/access(pageId=${page.id})},
                   data-delete-url=@{/api/pages/{pageId}/delete(pageId=${page.id})},
                   data-title=${page.title},
                   data-remove-confirm=#{remove_tool_confirm(${page.title})}">
        <div class="tool-order-row-main">
          <div class="tool-order-move-controls" th:if="${reorderAllowed}">
            <button type="button"
                    class="btn btn-icon tool-order-drag-handle"
                    data-action="drag-handle"
                    draggable="true"
                    th:title="#{drag_tool}"
                    th:attr="aria-label=#{drag_tool}">
              <span class="si si-drag-handle" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-icon"
                    data-action="move-up"
                    th:disabled="${page.first}"
                    th:title="#{move_up}"
                    th:attr="aria-label=#{move_up}">
              <span class="bi bi-chevron-up" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-icon"
                    data-action="move-down"
                    th:disabled="${page.last}"
                    th:title="#{move_down}"
                    th:attr="aria-label=#{move_down}">
              <span class="bi bi-chevron-down" aria-hidden="true"></span>
            </button>
          </div>

          <div class="tool-order-row-content">
            <span th:class="${page.toolIconClass}" aria-hidden="true"></span>

            <div class="tool-order-title-block">
              <div class="tool-order-display">
                <span class="tool-order-title" th:text="${page.title}">Tool title</span>
                <span class="badge text-bg-secondary tool-order-hidden-badge"
                      th:classappend="${page.hidden} ? '' : ' d-none'"
                      th:text="#{status_hidden}">Hidden</span>
                <span class="badge text-bg-warning tool-order-locked-badge"
                      th:classappend="${page.locked} ? '' : ' d-none'"
                      th:text="#{status_locked}">Locked</span>
              </div>

              <form class="tool-order-edit-form d-none">
                <div class="tool-order-edit-fields">
                  <label class="form-label" th:for="|title-${page.id}|" th:text="#{title}">Title</label>
                  <input class="form-control form-control-sm"
                         th:id="|title-${page.id}|"
                         name="title"
                         maxlength="20"
                         th:value="${page.title}">
                  <div th:if="${page.webContent}" class="tool-order-url-field">
                    <label class="form-label" th:for="|url-${page.id}|" th:text="#{url}">URL</label>
                    <input class="form-control form-control-sm"
                           th:id="|url-${page.id}|"
                           name="webContentUrl"
                           th:value="${page.webContentUrl}">
                  </div>
                </div>
                <div class="tool-order-edit-actions">
                  <button type="submit"
                          class="btn btn-primary btn-sm"
                          th:title="#{save_tool_title}">
                    <span class="bi bi-check-lg" aria-hidden="true"></span>
                    <span th:text="#{save}">Save</span>
                  </button>
                  <button type="button"
                          class="btn btn-outline-secondary btn-sm"
                          data-action="cancel-edit"
                          th:title="#{cancel_tool_title}">
                    <span class="bi bi-x-lg" aria-hidden="true"></span>
                    <span th:text="#{cancel}">Cancel</span>
                  </button>
                </div>
              </form>
            </div>
          </div>

          <div class="tool-order-row-actions">
            <button type="button"
                    class="btn btn-icon"
                    data-action="edit"
                    th:if="${page.allowsEdit}"
                    th:title="#{menu_edit_page_title}"
                    th:attr="aria-label=#{page_edit(${page.title})}">
              <span class="bi bi-pencil" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-icon"
                    data-action="visibility"
                    th:if="${page.allowsHide}"
                    th:disabled="${!page.enabled}"
                    th:attr="data-next-visible=${!page.visible || !page.enabled},
                             aria-label=${page.visible} ? #{page_hide(${page.title})} : #{page_show(${page.title})},
                             title=${page.visible} ? #{menu_hide_page} : #{menu_show_page}">
              <span th:class="${page.visible} ? 'bi bi-eye-slash' : 'bi bi-eye'" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-icon"
                    data-action="access"
                    th:if="${page.allowsLock}"
                    th:attr="data-next-enabled=${!page.enabled},
                             aria-label=${page.enabled} ? #{page_disable(${page.title})} : #{page_enable(${page.title})},
                             title=${page.enabled} ? #{menu_lock_page} : #{menu_enable_page}">
              <span th:class="${page.enabled} ? 'bi bi-lock' : 'bi bi-unlock'" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-icon text-danger"
                    data-action="delete"
                    th:if="${page.deletable}"
                    th:title="#{menu_remove_page}"
                    th:attr="aria-label=#{page_remove(${page.title})}">
              <span class="bi bi-trash" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </li>
    </ul>

    <p class="tool-order-empty" th:if="${#lists.isEmpty(pages)}" th:text="#{empty_tools}">
      There are no tools to order in this site.
    </p>
  </main>
</body>
</html>
